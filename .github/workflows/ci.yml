name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PYTHONPATH: "src"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --only-group dev

      - name: Run ruff linter
        run: uv run ruff check src/

      - name: Run ruff formatter check
        run: uv run ruff format --check src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --only-group dev

      - name: Run ty type checker (console)
        run: uv run ty check src/

      - name: Run ty (GitLab JSON for Sonar)
        if: always()
        continue-on-error: true
        run: |
          set +e
          uv run ty check src/ --output-format=gitlab > ty-gitlab-report.json 2> ty-stderr.log
          rc=$?
          if [ ! -s ty-gitlab-report.json ]; then
            echo "ty produced no JSON output (rc=$rc). stderr:"
            cat ty-stderr.log || true
            echo '[]' > ty-gitlab-report.json
          fi
          exit 0

      - name: Convert ty report to Sonar external issues
        if: always()
        run: |
          python3 scripts/ci/ty_gitlab_to_sonar_external_issues.py \
            --input ty-gitlab-report.json \
            --output ty-external-issues.json \
            --repo-root "$GITHUB_WORKSPACE"

      - name: Upload ty external issues
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ty-external-issues
          path: ty-external-issues.json
          retention-days: 7
          if-no-files-found: warn

  frontend:
    name: Frontend QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run frontend lint + format check + typecheck
        run: npm run check

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Run bandit (console gate)
        run: uv tool run --from "bandit[sarif]" bandit -c pyproject.toml -r src/

      - name: Run bandit (SARIF for Sonar)
        if: always()
        continue-on-error: true
        run: |
          uv tool run --from "bandit[sarif]" bandit -c pyproject.toml -r src/ \
            -f sarif -o bandit-results.sarif
          if [ ! -f bandit-results.sarif ]; then
            echo "Bandit SARIF output missing; writing empty fallback."
            printf '{"version":"2.1.0","runs":[]}' > bandit-results.sarif
          fi

      - name: Upload bandit SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-results.sarif
          retention-days: 7
          if-no-files-found: warn

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --only-group dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov=src/app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test artifacts for Sonar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: |
            coverage.xml
            test-results.xml
          retention-days: 7
          if-no-files-found: warn

  sonarqube:
    name: SonarQube
    runs-on: mayflower-k8s-runners
    needs:
      - typecheck
      - security
      - test
    if: |
      always() &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'failure' || needs.typecheck.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'failure' || needs.security.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'failure' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Python test artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: python-test-results
          path: .

      - name: Download ty external issues
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ty-external-issues
          path: .

      - name: Download bandit SARIF
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bandit-sarif
          path: .

      - name: Collect available report paths
        id: reports
        run: |
          set -euo pipefail

          sarif_files=()
          [ -f bandit-results.sarif ] && sarif_files+=("bandit-results.sarif")
          sarif_paths="$(IFS=,; echo "${sarif_files[*]}")"

          external_issue_files=()
          [ -f ty-external-issues.json ] && external_issue_files+=("ty-external-issues.json")
          external_issue_paths="$(IFS=,; echo "${external_issue_files[*]}")"

          test_execution_files=()
          [ -f test-results.xml ] && test_execution_files+=("test-results.xml")
          test_execution_paths="$(IFS=,; echo "${test_execution_files[*]}")"

          echo "sarif_paths=$sarif_paths" >> "$GITHUB_OUTPUT"
          echo "external_issue_paths=$external_issue_paths" >> "$GITHUB_OUTPUT"
          echo "test_execution_paths=$test_execution_paths" >> "$GITHUB_OUTPUT"

      - name: Cache SonarQube scanner
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}-${{ hashFiles('sonar-project.properties') }}
          restore-keys: sonar-${{ runner.os }}-

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >-
            ${{ steps.reports.outputs.sarif_paths != '' && format('-Dsonar.sarifReportPaths={0}', steps.reports.outputs.sarif_paths) || '' }}
            ${{ steps.reports.outputs.external_issue_paths != '' && format('-Dsonar.externalIssuesReportPaths={0}', steps.reports.outputs.external_issue_paths) || '' }}
            ${{ steps.reports.outputs.test_execution_paths != '' && format('-Dsonar.junit.reportPaths={0}', steps.reports.outputs.test_execution_paths) || '' }}
            -Dsonar.qualitygate.wait=false

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    continue-on-error: true  # CUDA build may exceed disk space
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
