<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaGap - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --synia-teal: #0099a8;
            --synia-teal-dark: #007a87;
            --synia-dark: #1f1f1f;
            --synia-text: rgba(18, 18, 18, 0.75);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Assistant', sans-serif;
            background: #f5f5f5;
            color: var(--synia-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card .logo {
            max-height: 60px;
            margin-bottom: 12px;
        }
        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--synia-dark);
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--synia-dark);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: 'Assistant', sans-serif;
            border: 1px solid #ccc;
            border-radius: 8px;
            color: var(--synia-dark);
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--synia-teal);
            box-shadow: 0 0 0 2px rgba(0, 153, 168, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-family: 'Assistant', sans-serif;
            font-weight: 600;
            background: var(--synia-teal);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: var(--synia-teal-dark);
        }
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-msg {
            color: #d9534f;
            font-size: 0.875rem;
            margin-top: 12px;
            min-height: 1.25em;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="/static/synia-logo.png" alt="LinguaGap" class="logo">
        <h1>LinguaGap</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Signing in\u2026';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const data = await resp.json();
                    errorMsg.textContent = data.error || 'Invalid username or password';
                }
            } catch {
                errorMsg.textContent = 'Connection error. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
