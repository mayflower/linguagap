<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SYNIA - Real-time Speech Translation</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/css/tokens.css" />
        <link rel="stylesheet" href="/static/css/topbar.css" />
        <link rel="stylesheet" href="/static/css/host-v3.css" />
    </head>
    <body>
        <div class="sga-page">
            <!-- Top bar -->
            <header class="sga-topbar">
                <div class="wordmark">
                    Synia <span class="sga">SGA</span>
                    <span class="crumb" id="subtitle">Real-time Speech Transcription &amp; Translation</span>
                </div>
                <span class="sep"></span>
                <span class="spacer"></span>
                <a id="translateLink" class="sga-ghost-btn" href="/translate" title="Text übersetzen">
                    Text übersetzen
                </a>
                <a id="adminLink" class="sga-ghost-btn" href="/admin" style="display: none" title="Admin">
                    Admin
                </a>
                <button id="logoutBtn" class="sga-ghost-btn" title="Logout">Logout</button>
                <select id="uiLangSelect" class="ui-lang" title="Interface Language">
                    <option value="de">🇩🇪 DE</option>
                    <option value="en">🇬🇧 EN</option>
                </select>
            </header>

            <!-- Status row (compact, replaces large heading) -->
            <div class="sga-status-row" id="status">
                <span id="statusText">Click "Start Recording" to begin</span>
                <span class="dual-channel-badge" id="dualChannelBadge">Dual Channel</span>
            </div>

            <!-- Amber "Gast spricht" hero — toggled by host.js on speaking_state -->
            <div class="sga-hero" id="viewerSpeakingIndicator" role="status" aria-live="polite">
                <div class="sga-hero-mic" aria-hidden="true">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <rect x="9" y="3" width="6" height="12" rx="3" fill="#fff" />
                        <path d="M5 11a7 7 0 0 0 14 0" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                        <path d="M12 18v3" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </div>
                <div class="sga-hero-text">
                    <span class="sga-hero-eyebrow" id="viewerSpeakingText">● Live · Gast spricht</span>
                    <span class="sga-hero-title">
                        <span class="sga-hero-flow" id="heroFromLang">🇬🇧 <span>English</span></span>
                        <svg width="42" height="14" viewBox="0 0 42 14" aria-hidden="true">
                            <defs>
                                <marker id="hostArrEnd" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                                    <path d="M0,0 L6,3 L0,6 z" fill="#92400e" />
                                </marker>
                            </defs>
                            <line x1="0" y1="7" x2="36" y2="7" stroke="#92400e" stroke-width="2"
                                  stroke-linecap="round" stroke-dasharray="3 4" marker-end="url(#hostArrEnd)">
                                <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1s"
                                         repeatCount="indefinite" />
                            </line>
                        </svg>
                        <span class="sga-hero-flow" id="heroToLang">🇩🇪 <span>Deutsch</span></span>
                    </span>
                </div>
                <div class="sga-hero-wave" aria-hidden="true">
                    <span style="height:8px;animation-delay:0s"></span>
                    <span style="height:14px;animation-delay:.08s"></span>
                    <span style="height:20px;animation-delay:.16s"></span>
                    <span style="height:9px;animation-delay:.24s"></span>
                    <span style="height:18px;animation-delay:.32s"></span>
                    <span style="height:24px;animation-delay:.40s"></span>
                    <span style="height:11px;animation-delay:.48s"></span>
                    <span style="height:7px;animation-delay:0s"></span>
                    <span style="height:16px;animation-delay:.08s"></span>
                    <span style="height:22px;animation-delay:.16s"></span>
                    <span style="height:13px;animation-delay:.24s"></span>
                    <span style="height:19px;animation-delay:.32s"></span>
                    <span style="height:26px;animation-delay:.40s"></span>
                    <span style="height:10px;animation-delay:.48s"></span>
                    <span style="height:8px;animation-delay:0s"></span>
                    <span style="height:14px;animation-delay:.08s"></span>
                    <span style="height:20px;animation-delay:.16s"></span>
                    <span style="height:9px;animation-delay:.24s"></span>
                    <span style="height:18px;animation-delay:.32s"></span>
                    <span style="height:24px;animation-delay:.40s"></span>
                    <span style="height:11px;animation-delay:.48s"></span>
                    <span style="height:7px;animation-delay:0s"></span>
                    <span style="height:16px;animation-delay:.08s"></span>
                    <span style="height:22px;animation-delay:.16s"></span>
                    <span style="height:13px;animation-delay:.24s"></span>
                    <span style="height:19px;animation-delay:.32s"></span>
                    <span style="height:26px;animation-delay:.40s"></span>
                    <span style="height:10px;animation-delay:.48s"></span>
                </div>
                <span class="sga-hero-pill">läuft</span>
            </div>

            <!-- Translation-in-flight pill -->
            <div class="sga-translating" id="translatingIndicator">
                <span id="translatingText">Übersetzung läuft…</span>
            </div>

            <!-- Toolbar -->
            <div class="sga-toolbar">
                <select id="audioInputSelect" class="sga-mic-select" title="Microphone">
                    <option value="">Default Microphone</option>
                </select>
                <!-- languageSelect kept in DOM for host.js + populateLanguages, hidden via CSS -->
                <select id="languageSelect">
                    <option value="" disabled selected>-- Select Language --</option>
                </select>
                <div class="sga-lang-pair" id="langPair" title="Foreign ⇄ German">
                    <span class="lang" id="leftLangLabel">EN</span>
                    <button class="swap" type="button" aria-label="swap" tabindex="-1">⇄</button>
                    <span class="lang" id="rightLangLabel">DE</span>
                </div>
                <label class="sga-segmented" id="pttToggleLabel" title="Push-to-Talk">
                    <input type="checkbox" id="pttToggle" hidden />
                    <button type="button" class="ptt-on" id="pttLabelText">Sprechtaste</button>
                    <button type="button" class="ptt-off on">Auto</button>
                </label>
                <label class="sga-toggle" id="hostTranscriptLabel" title="Protokoll erstellen">
                    <input type="checkbox" id="hostTranscriptToggle" hidden />
                    <span class="sga-toggle-track"></span>
                    <span class="sga-toggle-label" id="hostTranscriptLabelText">Protokoll</span>
                </label>
                <span class="grow"></span>
                <button id="railToggleBtn" class="sga-ghost-btn" type="button">
                    Seitenleiste ausblenden ›
                </button>
                <button id="muteBtn" class="sga-mute-btn" disabled style="display: none">Mute</button>
                <button id="clearBtn" class="sga-ghost-btn" type="button">Clear</button>
                <button id="startBtn" class="sga-primary-btn" type="button">Gespräch starten</button>
            </div>

            <!-- Stage: conversation thread + optional rail -->
            <div class="sga-stage with-rail" id="sgaStage">
                <div class="sga-thread" id="sgaThread"></div>

                <aside class="sga-rail">
                    <div class="sga-rail-card">
                        <div class="sga-rail-title" id="qrTitle">Live mitlesen</div>
                        <div id="qrCode"></div>
                        <div class="sga-rail-sub" id="qrSubtitle">
                            Gäste scannen den Code,<br />um auf dem Handy mitzulesen.
                        </div>
                        <div class="sga-rail-url" id="viewerUrlText"></div>
                    </div>
                    <div class="sga-rail-card export">
                        <div class="sga-rail-title">Export</div>
                        <div class="transcript-download-bar" id="transcriptDownloadBar">
                            <button class="transcript-download-btn" id="transcriptDownloadBtn"></button>
                        </div>
                    </div>
                </aside>
            </div>
        </div>

        <!-- QR Code Generator Library (qrcode-generator, MIT licensed, ~5KB) -->
        <script src="/static/js/vendor/qrcode.js" defer></script>

        <script src="/static/js/lib/dom.js" defer></script>
        <script src="/static/js/lib/audio.js" defer></script>
        <script src="/static/js/lib/auth_guard.js" defer></script>
        <script src="/static/js/lib/i18n.js" defer></script>
        <script src="/static/js/transcript_export.js" defer></script>
        <script src="/static/js/host.js" defer></script>
    </body>
</html>
