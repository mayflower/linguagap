<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Text übersetzen — Synia</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/css/tokens.css" />
        <link rel="stylesheet" href="/static/css/topbar.css" />
        <link rel="stylesheet" href="/static/css/translate-v3.css" />
    </head>
    <body>
        <div class="tx-page">
            <header class="sga-topbar">
                <a class="sga-ghost-btn" href="/" title="Zurück zur Live-Übersetzung">← Live</a>
                <span class="sep"></span>
                <div class="wordmark">
                    Synia <span class="sga">SGA</span>
                    <span class="crumb">· Text übersetzen</span>
                </div>
                <span class="spacer"></span>
                <button id="logoutBtn" class="sga-ghost-btn" title="Logout">Logout</button>
            </header>

            <div class="error-banner" id="errorBanner"></div>

            <div class="tx-stage">
                <div class="tx-split">
                    <!-- Left — source -->
                    <section class="tx-pane left">
                        <div class="tx-header">
                            <span class="lang">
                                <span id="srcFlag">🇩🇪</span>
                                <select id="srcLang" class="tx-header-select"></select>
                                <span class="sub">· Original</span>
                            </span>
                            <button class="tx-header-action" id="clearSrcBtn" type="button">
                                ✕ Löschen
                            </button>
                        </div>
                        <textarea
                            id="sourceText"
                            class="tx-textarea"
                            placeholder="Originaltext eingeben…"
                        ></textarea>
                    </section>

                    <!-- Right — target -->
                    <section class="tx-pane right">
                        <div class="tx-header">
                            <span class="lang">
                                <span id="tgtFlag">🇬🇧</span>
                                <select id="tgtLang" class="tx-header-select"></select>
                                <span class="sub">· Übersetzung</span>
                            </span>
                        </div>
                        <div id="result" class="tx-result empty">Hier erscheint die Übersetzung.</div>
                        <div class="tx-actions">
                            <button class="sga-primary-btn" id="printBtn" type="button" disabled>
                                Drucken
                            </button>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <script src="/static/js/lib/auth_guard.js" defer></script>
        <script src="/static/js/translate.js" defer></script>
    </body>
</html>
