<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>SYNIA Viewer</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/css/tokens.css" />
        <link rel="stylesheet" href="/static/css/viewer-v3.css" />
    </head>
    <body>
        <!-- Consent overlay — same id as before so viewer.js wiring is intact -->
        <div class="consent-overlay" id="consentOverlay">
            <div class="consent-card">
                <div class="brand-text">Synia <span style="opacity:.85">SGA</span></div>
                <h2 class="consent-title" id="consentTitle">Datenschutz &amp; Nutzungshinweis</h2>
                <select id="consentLangSelect">
                    <option value="de" selected>Deutsch</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="it">Italiano</option>
                    <option value="pl">Polski</option>
                    <option value="ro">Română</option>
                    <option value="hr">Hrvatski</option>
                    <option value="bg">Български</option>
                    <option value="tr">Türkçe</option>
                    <option value="ru">Русский</option>
                    <option value="uk">Українська</option>
                    <option value="hu">Magyar</option>
                    <option value="sr">Српски</option>
                    <option value="sq">Shqip</option>
                    <option value="ar">العربية (beta)</option>
                    <option value="fa">فارسی (beta)</option>
                </select>
                <p class="consent-body" id="consentBody"></p>
                <button class="consent-accept-btn" id="consentAcceptBtn">Akzeptieren</button>
            </div>
        </div>

        <div class="viewer-app container hidden">
            <!-- Top bar -->
            <header class="m-topbar">
                <div class="wordmark">Synia <span class="sga">SGA</span></div>
                <span class="sep"></span>
                <span class="timer" id="sessionTimer" aria-label="session duration">00:00</span>
                <span class="status-dot" id="statusDot" aria-hidden="true"></span>
                <span class="spacer"></span>
                <button class="menu" type="button" aria-label="menu">⋯</button>
            </header>

            <!-- Compact status text under top bar -->
            <div class="m-status-line" id="status">
                <span id="statusText"></span>
            </div>

            <!-- Hero — amber "Host is speaking" strip -->
            <div class="m-hero" id="hostSpeakingIndicator" role="status" aria-live="polite">
                <div class="m-hero-mic" aria-hidden="true">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <rect x="9" y="3" width="6" height="12" rx="3" fill="#fff" />
                        <path d="M5 11a7 7 0 0 0 14 0" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                        <path d="M12 18v3" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </div>
                <div class="m-hero-text">
                    <span class="m-hero-eyebrow">Live</span>
                    <span class="m-hero-title" id="hostSpeakingText">Host is speaking…</span>
                </div>
                <div class="m-hero-wave" aria-hidden="true">
                    <span style="height:6px;animation-delay:0s"></span>
                    <span style="height:13px;animation-delay:.08s"></span>
                    <span style="height:18px;animation-delay:.16s"></span>
                    <span style="height:8px;animation-delay:.24s"></span>
                    <span style="height:15px;animation-delay:.32s"></span>
                    <span style="height:20px;animation-delay:.40s"></span>
                    <span style="height:9px;animation-delay:.48s"></span>
                    <span style="height:6px;animation-delay:0s"></span>
                    <span style="height:13px;animation-delay:.08s"></span>
                    <span style="height:18px;animation-delay:.16s"></span>
                    <span style="height:8px;animation-delay:.24s"></span>
                    <span style="height:15px;animation-delay:.32s"></span>
                    <span style="height:20px;animation-delay:.40s"></span>
                    <span style="height:9px;animation-delay:.48s"></span>
                </div>
            </div>

            <!-- Translating-in-flight pill -->
            <div class="m-translating" id="translatingIndicator">
                <span id="translatingText">Übersetzung läuft…</span>
            </div>

            <!-- Conversation thread -->
            <div class="m-thread" id="transcript"></div>

            <!-- Transcript-consent banner -->
            <div class="transcript-consent-banner" id="transcriptConsentBanner">
                <div class="transcript-consent-title" id="transcriptConsentTitle"></div>
                <div class="transcript-consent-actions">
                    <button class="transcript-consent-no" id="transcriptConsentNoBtn"></button>
                    <button class="transcript-consent-yes" id="transcriptConsentYesBtn"></button>
                </div>
            </div>

            <!-- Bottom bar — Auto/PTT toggle · Mic · TTS -->
            <div class="m-lang-select-wrap" id="micBar">
                <select id="viewerLangSelect">
                    <option value="" disabled selected id="langPlaceholder">
                        -- Your language --
                    </option>
                </select>
            </div>
            <div class="m-bottom">
                <div class="m-mode-toggle" id="modeToggle">
                    <button type="button" class="mode-ptt" data-mode="ptt">Push to talk</button>
                    <button type="button" class="mode-auto on" data-mode="auto">Auto</button>
                </div>

                <div class="m-mic-col">
                    <button class="m-mic-btn" id="micBtn" type="button" title="Start microphone" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <rect x="9" y="3" width="6" height="12" rx="3" fill="#fff" />
                            <path d="M5 11a7 7 0 0 0 14 0" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                            <path d="M12 18v3" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                    <span class="m-mic-caption" id="micStatus"></span>
                </div>

                <button class="m-mute-btn" id="muteBtn" type="button" title="Mute">🔊</button>

                <button class="m-tts" id="ttsToggle" type="button" aria-label="Read aloud">
                    <span class="icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" />
                            <path d="M16 8.5a4 4 0 0 1 0 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                            <path d="M18.5 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                        </svg>
                    </span>
                    <span class="label">Read aloud</span>
                </button>
            </div>
        </div>

        <script src="/static/js/lib/dom.js" defer></script>
        <script src="/static/js/lib/audio.js" defer></script>
        <script src="/static/js/lib/i18n.js" defer></script>
        <script src="/static/js/viewer.js" defer></script>
    </body>
</html>
