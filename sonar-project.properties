sonar.projectKey=Linguagap
sonar.projectName=Linguagap

# Source directories
sonar.sources=src,static/js

# Test directory
sonar.tests=tests
sonar.test.inclusions=tests/**

# Exclusions - vendored code, generated files, lockfiles
sonar.exclusions=\
  **/.venv/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/node_modules/**,\
  **/uv.lock,\
  **/package-lock.json,\
  **/coverage.xml,\
  **/test-results.xml,\
  static/js/vendor/**,\
  static/js/lib/**,\
  static/js/types.d.ts,\
  static/js/audio_capture_worklet.js,\
  src/app/scripts/**,\
  marketing/**,\
  tmp/**

# Python settings
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Coverage exclusions - boilerplate, entry points, untestable wiring
sonar.coverage.exclusions=\
  src/app/scripts/**,\
  src/app/main.py,\
  static/**

# JavaScript / TypeScript settings (static frontend, no transpile)
sonar.javascript.file.suffixes=.js
sonar.typescript.file.suffixes=.ts,.tsx

# External security tool reports (SARIF / generic external issues)
# These are passed via CLI in GitHub Actions:
#   -Dsonar.sarifReportPaths=bandit-results.sarif
#   -Dsonar.externalIssuesReportPaths=ty-external-issues.json
#
# Tools providing SARIF to SonarQube:
# - bandit-results.sarif: Python security scanner
#
# Tools NOT providing SARIF (imported as Sonar Generic External Issues):
# - ty: type checker, converted from GitLab JSON via
#   scripts/ci/ty_gitlab_to_sonar_external_issues.py
