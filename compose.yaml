services:
  gpu-smoke:
    image: nvidia/cuda:12.8.0-runtime-ubuntu24.04
    command: nvidia-smi
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1

  backend:
    build: .
    ports:
      - "0.0.0.0:8080:8000"
    volumes:
      - hf-cache:/data/hf
      - piper-cache:/data/piper
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/data/hf
      - HF_HUB_DISABLE_TELEMETRY=1
      - TTS_BACKEND=piper
      - PIPER_DATA_DIR=/data/piper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["1"]

volumes:
  hf-cache:
  piper-cache:
