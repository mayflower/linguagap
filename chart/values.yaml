replicaCount: 1

image:
  repository: ghcr.io/mayflower/linguagap
  tag: "cd3032e"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: traefik
  host: linguagap.data.mayflower.tech
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  tls:
    enabled: true
    secretName: linguagap-tls

persistence:
  enabled: true
  size: 20Gi
  storageClassName: longhorn
  accessMode: ReadWriteOnce

resources:
  requests:
    memory: "12Gi"
    cpu: "2"
    nvidia.com/gpu: "1"
  limits:
    memory: "24Gi"
    cpu: "8"
    nvidia.com/gpu: "1"

# Probes - 27B model takes ~25min to load on Blackwell GPU
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 1800
  periodSeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 1800
  periodSeconds: 30
  timeoutSeconds: 30
  failureThreshold: 20

# Environment variables
env:
  # Backend selection
  ASR_BACKEND: whisper
  MT_BACKEND: translategemma
  SUMM_BACKEND: ""  # Empty = disabled. Set to "qwen3" to enable summarization.
  TTS_BACKEND: kugelaudio
  # ASR config
  ASR_MODEL: deepdml/faster-whisper-large-v3-turbo-ct2
  ASR_DEVICE: cuda
  ASR_COMPUTE_TYPE: float16
  # Translation config
  MT_MODEL_REPO: mradermacher/translategemma-27b-it-GGUF
  MT_MODEL_FILE: translategemma-27b-it.Q3_K_S.gguf
  MT_N_GPU_LAYERS: "-1"
  MT_N_CTX: "4096"
  WINDOW_SEC: "8.0"
  TICK_SEC: "0.5"
  STABILITY_SEC: "1.25"
  MAX_BUFFER_SEC: "30.0"
  HF_HOME: /data/hf
  HF_HUB_DISABLE_TELEMETRY: "1"
  PYTHONUNBUFFERED: "1"
  # Diarization settings
  DIARIZATION_ENABLED: "true"
  DIARIZATION_DEVICE: cuda
  # TTS config
  TTS_MODEL_ID: kugelaudio/kugelaudio-0-open
  TTS_CFG_SCALE: "3.0"
  # Auth config
  ADMIN_EMAIL: "verben@synia.org"
  # ADMIN_PASSWORD: set via K8s secret, not in values.yaml
  # Persistent state directory: backed by the hf-cache PVC's "state" subPath.
  # Holds accounts.json and the logos/ uploads directory.
  DATA_DIR: /data/state
  # DEMO_ACCOUNTS: '[]'  # Optional: JSON array override for demo accounts

# Secrets configuration
# For HF_TOKEN: either create the secret manually or set create: true with value
# Manual creation: kubectl create secret generic hf-token --from-literal=token=YOUR_TOKEN -n linguagap
secrets:
  hfToken:
    enabled: true
    secretName: hf-token
    secretKey: token
    # Set create: true and value to create the secret via Helm (not recommended for production)
    create: false
    value: ""
  sessionSecret:
    enabled: true
    secretName: linguagap-session-secret
    secretKey: secret
    create: false
    value: ""
  adminPassword:
    enabled: true
    secretName: linguagap-admin-password
    secretKey: password
    create: false
    value: ""

nodeSelector: {}

tolerations: []

affinity: {}

# Monitoring configuration
monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: monitoring
  prometheusRule:
    enabled: true
    labels:
      release: monitoring
  grafana:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folder: LinguaGap
